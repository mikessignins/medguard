  <text x="596" y="804" fill="#2D646D" font-family="Arial, sans-serif" font-size="15" font-weight="700">Open</text>

  <rect x="225" y="864" width="455" height="112" rx="24" fill="#FFFFFF" stroke="#D9D4CF"/>
  <rect x="247" y="888" width="122" height="28" rx="14" fill="#D85A5A"/>
