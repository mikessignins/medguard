    <rect x="460" y="392" width="220" height="116" rx="24" fill="#2D646D"/>
    <text x="487" y="432" fill="#F7FBFA" font-family="Arial, sans-serif" font-size="16" font-weight="700">Support Check-In</text>
    <text x="487" y="462" fill="#E7F7F4" font-family="Arial, sans-serif" font-size="14">Ask for medic or welfare support</text>
    <circle cx="640" cy="450" r="18" fill="#FFFFFF" fill-opacity="0.2"/>
    <text x="634" y="456" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="700">+</text>

    <rect x="225" y="524" width="220" height="102" rx="24" fill="#FFFFFF" stroke="#D9D4CF"/>
    <text x="252" y="560" fill="#244750" font-family="Arial, sans-serif" font-size="16" font-weight="700">Wellbeing Pulse</text>
    <text x="252" y="588" fill="#66757B" font-family="Arial, sans-serif" font-size="14">De-identified check-in</text>

    <rect x="460" y="524" width="220" height="102" rx="24" fill="#FFFFFF" stroke="#D9D4CF"/>
    <text x="487" y="560" fill="#244750" font-family="Arial, sans-serif" font-size="16" font-weight="700">Fatigue Assessment</text>
    <text x="487" y="588" fill="#66757B" font-family="Arial, sans-serif" font-size="14">Self-assessment module</text>
  </g>

  <!-- Needs attention -->
  <text x="225" y="700" fill="#173136" font-family="Arial, sans-serif" font-size="24" font-weight="700">Needs Attention</text>
