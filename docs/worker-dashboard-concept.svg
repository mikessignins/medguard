  <rect x="225" y="1064" width="455" height="188" rx="24" fill="#FFFFFF" stroke="#D9D4CF"/>
  <text x="247" y="1104" fill="#173136" font-family="Arial, sans-serif" font-size="20" font-weight="700">Pilbara Operations Village</text>
