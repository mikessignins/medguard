<svg width="900" height="1600" viewBox="0 0 900 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="1600" fill="#EDEBE8"/>
  <rect x="170" y="40" width="560" height="1520" rx="54" fill="#F6F3EF"/>
