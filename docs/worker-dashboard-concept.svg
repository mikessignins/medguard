  <line x1="247" y1="1156" x2="658" y2="1156" stroke="#ECE7E2"/>
  <text x="247" y="1192" fill="#66757B" font-family="Arial, sans-serif" font-size="14">Site Medic</text>
  <text x="247" y="1218" fill="#173136" font-family="Arial, sans-serif" font-size="17" font-weight="700">0400 123 456</text>
  <text x="560" y="1212" fill="#2D646D" font-family="Arial, sans-serif" font-size="15" font-weight="700">Call</text>
  <text x="247" y="1270" fill="#66757B" font-family="Arial, sans-serif" font-size="14">Employee Assistance Program</text>
  <text x="247" y="1296" fill="#173136" font-family="Arial, sans-serif" font-size="17" font-weight="700">1800 555 111</text>

  <!-- Recent activity -->
  <text x="225" y="1360" fill="#173136" font-family="Arial, sans-serif" font-size="24" font-weight="700">Recent Activity</text>
  <text x="580" y="1360" fill="#2D646D" font-family="Arial, sans-serif" font-size="15" font-weight="700">View all</text>
  <rect x="225" y="1388" width="455" height="104" rx="24" fill="#FFFFFF" stroke="#D9D4CF"/>
  <text x="247" y="1428" fill="#173136" font-family="Arial, sans-serif" font-size="17" font-weight="700">Wellbeing Pulse</text>
  <text x="247" y="1455" fill="#66757B" font-family="Arial, sans-serif" font-size="15">Submitted today at 08:42</text>
  <rect x="573" y="1412" width="85" height="28" rx="14" fill="#DDEEEA"/>
  <text x="592" y="1431" fill="#2D646D" font-family="Arial, sans-serif" font-size="13" font-weight="700">Saved</text>

  <defs>
    <linearGradient id="hero" x1="195" y1="70" x2="705" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7E2DF"/>
      <stop offset="1" stop-color="#C8D6D4"/>
    </linearGradient>
